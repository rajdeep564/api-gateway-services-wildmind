# --- ACME Challenge ---
server {
    listen 80;
    server_name api.wildmindai.com www.wildmindai.com studios.wildmindai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- API ---
server {
    listen 443 ssl;
    server_name api.wildmindai.com;

    ssl_certificate /etc/letsencrypt/live/api.wildmindai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.wildmindai.com/privkey.pem;

    location / {
        proxy_pass http://api-gateway:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}

# --- Wild Frontend ---
server {
    listen 443 ssl;
    server_name www.wildmindai.com;

    ssl_certificate /etc/letsencrypt/live/www.wildmindai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.wildmindai.com/privkey.pem;

    location / {
        proxy_pass http://wild:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# --- Canvas Frontend ---
server {
    listen 443 ssl;
    server_name studios.wildmindai.com;

    ssl_certificate /etc/letsencrypt/live/studios.wildmindai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studios.wildmindai.com/privkey.pem;

    location / {
        proxy_pass http://wildmindcanvas:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
