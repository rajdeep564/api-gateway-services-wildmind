version: "3.9"

# ============================================================
# WildMind AI — Lightsail Production Stack (PROD TAGS)
# ECR Region : ap-south-1
# ECR Account : 213128717650
# Tag         : prod
# ============================================================

x-ecr: &ecr-base
  213128717650.dkr.ecr.ap-south-1.amazonaws.com

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:alpine
    container_name: wildmind-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /home/ubuntu/wildmind/certbot/www:/var/www/certbot:ro
    depends_on:
      - wild
      - wildmindcanvas
      - api-gateway
    networks:
      - wildmind-network
    deploy:
      resources:
        limits:
          memory: 128M
    logging: *default-logging

  wild:
    image: 213128717650.dkr.ecr.ap-south-1.amazonaws.com/wild:prod
    container_name: wild
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NODE_OPTIONS=--max-old-space-size=384
    env_file:
      - .env.production
    depends_on:
      - api-gateway
    networks:
      - wildmind-network
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging

  wildmindcanvas:
    image: 213128717650.dkr.ecr.ap-south-1.amazonaws.com/wildmindcanvas:prod
    container_name: wildmindcanvas
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NODE_OPTIONS=--max-old-space-size=384
    env_file:
      - .env.production
    networks:
      - wildmind-network
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging

  api-gateway:
    image: 213128717650.dkr.ecr.ap-south-1.amazonaws.com/api-gateway:prod
    container_name: wildmind-api-gateway
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - NODE_OPTIONS=--max-old-space-size=384
      - REDIS_URL=redis://wildmind-redis:6379
      - CREDIT_SERVICE_URL=http://wildmind-credit-service:3000
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
      credit-service:
        condition: service_healthy
    networks:
      - wildmind-network
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging

  credit-service:
    image: 213128717650.dkr.ecr.ap-south-1.amazonaws.com/credit-service:prod
    container_name: wildmind-credit-service
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NODE_OPTIONS=--max-old-space-size=256
      - REDIS_URL=redis://wildmind-redis:6379
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3000/health', r => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wildmind-network
    deploy:
      resources:
        limits:
          memory: 320M
    logging: *default-logging

  mirror-worker:
    image: 213128717650.dkr.ecr.ap-south-1.amazonaws.com/api-gateway:prod
    container_name: wildmind-mirror-worker
    restart: unless-stopped
    command: node dist/workers/mirrorQueueWorker.js
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=192
      - REDIS_URL=redis://wildmind-redis:6379
      - CREDIT_SERVICE_URL=http://wildmind-credit-service:3000
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_started
    networks:
      - wildmind-network
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: wildmind-redis
    restart: always
    expose:
      - "6379"
    command: redis-server --appendonly yes --maxmemory 192mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - wildmind-network
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

volumes:
  redis-data:
    driver: local

networks:
  wildmind-network:
    driver: bridge
